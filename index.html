<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Portal - Select Role</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Animated Background Elements -->
    <div class="background-container">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <h1>Job Portal</h1>
        <p class="subtitle">Choose how you want to proceed</p>

        <div class="options-wrapper">

            <!-- Job Seeker Card - Links to jobseeker.html -->
            <a href="jobseeker.html" class="option-card seeker">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-user"></i>
                </div>
                <h3>Job Seeker</h3>
                <p>Search and apply for the best jobs matching your skills.</p>
            </a>

            <!-- Job Provider Card -->
            <a href="provider.html" class="option-card provider">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-building"></i>
                </div>
                <h3>Job Provider</h3>
                <p>Post jobs, manage applications, and find the right talent.</p>
            </a>

        </div>

        <div class="footer">
            &copy; All rights reserved by our team .
        </div>
    </div>

</body>
</html>
